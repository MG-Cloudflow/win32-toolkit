site_name: win32-toolkit
site_description: End-to-end Win32 app packaging for Microsoft Intune — winget or manual sources, PSADT v4, sandboxed capture & testing, .intunewin packaging, Graph publish.
site_url: https://win32toolkit.com/
repo_url: https://github.com/MG-Cloudflow/win32-toolkit
repo_name: MG-Cloudflow/win32-toolkit
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # 3-way: follow the OS by default, with explicit light/dark toggles.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MG-Cloudflow/win32-toolkit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: README.md
  - Learn:
      - Getting started: getting-started.md
      - Concepts: concepts.md
  - Guides:
      - Org templates: org-templates.md
      - Manual (non-winget) apps: manual-apps.md
      - Testing packages: testing.md
      - The Hyper-V test VM: hyperv-vm.md
      - App dependencies: dependencies.md
      - Packaging (.intunewin): packaging.md
      - Publishing to Intune: publishing.md
  - Reference:
      - Configuration values: configuration.md
      - Commands: reference/README.md
      - Command pages:
          - Show-Win32Toolkit: reference/Show-Win32Toolkit.md
          - Invoke-Win32Toolkit: reference/Invoke-Win32Toolkit.md
          - New-Win32ToolkitManualApp: reference/New-Win32ToolkitManualApp.md
          - Complete-Win32ToolkitManualApp: reference/Complete-Win32ToolkitManualApp.md
          - Test-Win32ToolkitProject: reference/Test-Win32ToolkitProject.md
          - Export-Win32ToolkitIntuneWin: reference/Export-Win32ToolkitIntuneWin.md
          - Publish-Win32ToolkitIntuneApp: reference/Publish-Win32ToolkitIntuneApp.md
          - Export-Win32ToolkitDocumentation: reference/Export-Win32ToolkitDocumentation.md
          - Set-Win32ToolkitAppDependency: reference/Set-Win32ToolkitAppDependency.md
          - Sync-Win32ToolkitAppDependency: reference/Sync-Win32ToolkitAppDependency.md
          - New-Win32ToolkitTestVM: reference/New-Win32ToolkitTestVM.md
          - Set-Win32ToolkitTestVMResource: reference/Set-Win32ToolkitTestVMResource.md
          - Reset-Win32ToolkitTestVM: reference/Reset-Win32ToolkitTestVM.md
          - Remove-Win32ToolkitTestVM: reference/Remove-Win32ToolkitTestVM.md
